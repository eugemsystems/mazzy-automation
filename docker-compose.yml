
name: mazzy

services:
    mariadb:
        image: mariadb:11.4
        container_name: mazzy-mariadb
        restart: unless-stopped
        environment:
            MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MARIADB_AUTO_UPGRADE: "1"
        volumes:
            - ./mariadb/data:/var/lib/mysql
            - ./mariadb/init:/docker-entrypoint-initdb.d:ro
        networks:
            - mazzy-net
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 12
        command:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --max-allowed-packet=256M
            - --innodb-buffer-pool-size=1G

    wp-main:
        image: wordpress:php8.2-fpm-alpine
        container_name: mazzy-wp-main
        restart: unless-stopped
        depends_on:
            mariadb:
                condition: service_healthy
        volumes:
            - ./wordpress/main:/var/www/html
            - ./wordpress/main:/var/www/main
            - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
        networks:
            - mazzy-net

    wp-store:
        image: wordpress:php8.2-fpm-alpine
        container_name: mazzy-wp-store
        restart: unless-stopped
        depends_on:
            mariadb:
                condition: service_healthy
        volumes:
            - ./wordpress/store:/var/www/html
            - ./wordpress/store:/var/www/store
            - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
        networks:
            - mazzy-net

    laravel-app:
        build:
            context: ./laravel/app
            dockerfile: Dockerfile
        image: mazzy-laravel-app
        container_name: mazzy-laravel
        restart: unless-stopped
        volumes:
            - ./laravel/app:/var/www/laravel
            - ./laravel/database:/var/www/laravel/database
        environment:
            APP_ENV: production
            APP_DEBUG: "false"
            APP_KEY: ${LARAVEL_APP_KEY}
            APP_URL: https://new.mazzyautomations.co.za
            APP_TIMEZONE: Africa/Johannesburg
            SESSION_DRIVER: database
            SESSION_DOMAIN: ""
            SESSION_SECURE_COOKIE: "false"
            SESSION_LIFETIME: 120
            DB_CONNECTION: mysql
            DB_HOST: mariadb
            DB_PORT: 3306
            DB_DATABASE: mazzy_laravel
            DB_USERNAME: mazzy_laravel
            DB_PASSWORD: ${LARAVEL_DB_PASSWORD}
            CACHE_STORE: database
        depends_on:
            mariadb:
                condition: service_healthy
        networks:
            - mazzy-net

    nginx:
        image: nginx:1.27-alpine
        container_name: mazzy-nginx
        restart: unless-stopped
        depends_on:
            - wp-main
            - wp-store
            - laravel-app
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./nginx/conf.d:/etc/nginx/conf.d:ro
            - ./wordpress/main:/var/www/main:ro
            - ./wordpress/store:/var/www/store:ro
            - ./laravel/app:/var/www/laravel:ro
            - ./certbot/conf:/etc/letsencrypt:ro
            - ./certbot/www:/var/www/certbot
            - ./logs/nginx:/var/log/nginx
        networks:
            - mazzy-net

networks:
    mazzy-net:
        driver: bridge
